services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon-db
    environment:
      POSTGRES_DB: carbondb
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon -d carbondb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbon-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: carbondb
      DB_USER: carbon
      DB_PASSWORD: carbon
      JWT_SECRET: Y2FyYm9uLWZvb3RwcmludC1jYWxjdWxhdG9yLXNlY3JldC1rZXk=
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbon-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
